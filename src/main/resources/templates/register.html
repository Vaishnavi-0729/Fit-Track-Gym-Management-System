<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Background Video */

#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Dark Transparent Layer */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    z-index:-1;
}

/* Glass Card */

.container{

    width:380px;
    padding:35px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border-radius:20px;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 8px 30px rgba(0,0,0,.35);

    animation:fadeIn .8s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h2{

color:white;
text-align:center;
margin-bottom:25px;

}

input{

width:100%;
padding:12px;
margin:10px 0;

border:none;

border-radius:8px;

outline:none;

}

button{

width:100%;
padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

background:#ff6b00;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#ff8c32;

}

.error{

color:#ff8080;
text-align:center;
margin-bottom:10px;

}

.success{

color:#7CFC00;
text-align:center;
margin-bottom:10px;

}

p{

margin-top:18px;
text-align:center;
color:white;

}

a{

color:#FFD54F;
text-decoration:none;
font-weight:bold;

}

</style>

</head>

<body>
    <video autoplay muted loop playsinline id="bg-video">
    <source th:src="@{/videos/gym-bg.mp4}" type="video/mp4">
</video>

<div class="container">

    <h2>Create Account</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div th:if="${success}" class="success" th:text="${success}"></div>

    <form th:action="@{/register}" method="post">

    <input
        type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}" />

        <input
                type="text"
                name="username"
                placeholder="Username"
                required>

        <input
                type="password"
                name="password"
                placeholder="Password"
                required>

        <input
                type="password"
                name="confirmPassword"
                placeholder="Confirm Password"
                required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a th:href="@{/login}">Login</a>
    </p>

</div>

</body>
</html>
