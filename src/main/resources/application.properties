spring.application.name=javaproject

# ===================== Server =====================
server.port=8080

# ===================== MySQL Datasource =====================
# Create the database first: CREATE DATABASE gym_management_db;
spring.datasource.url=jdbc:mysql://localhost:3306/gym_management_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=my_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / Hibernate =====================
# update: keeps existing data and updates schema automatically as entities change.
# Use 'validate' or 'none' in production once the schema is stable, and manage
# schema changes with a migration tool (Flyway/Liquibase) instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================== Thymeleaf =====================
spring.thymeleaf.cache=false

# ===================== Devtools =====================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===================== Logging =====================
logging.level.org.springframework.security=INFO
logging.level.com.example.javaproject=DEBUG
